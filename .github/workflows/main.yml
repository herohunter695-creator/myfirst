name: CloudForge
on: [push, workflow_dispatch]
permissions:
  contents: write
jobs:
  runner:
    runs-on: windows-2022
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup RDP & Install Tools
      run: |
        # 1. Disable Password Complexity Requirements (Nuclear Option)
        secedit /export /cfg config.inf
        (Get-Content config.inf) -replace 'PasswordComplexity = 1', 'PasswordComplexity = 0' | Set-Content config.inf
        secedit /configure /db $env:windir\security\local.sdb /cfg config.inf /areas SECURITYPOLICY
        
        # 2. Enable RDP
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -name "UserAuthentication" -Value 1
        
        # 3. Create User RDP with complex password to ensure success
        $Password = ConvertTo-SecureString "CloudForge@RDP@2026!!" -AsPlainText -Force
        New-LocalUser -Name "RDP" -Password $Password -Description "CloudForge User"
        Add-LocalGroupMember -Group "Administrators" -Member "RDP"
        Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP"

        # 4. Pre-install wget for you
        choco install wget -y

    - name: Install Tailscale
      run: |
        $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
        Invoke-WebRequest -Uri $tsUrl -OutFile "tailscale.msi"
        Start-Process msiexec.exe -ArgumentList "/i", "tailscale.msi", "/quiet", "/norestart" -Wait

    - name: Start Tailscale & Get IP
      run: |
        & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=CloudForge-Runner
        Start-Sleep -Seconds 10
        $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
        
        if ($tsIP) {
          $tsIP | Out-File -FilePath ip.txt -Encoding utf8
          git config --global user.email "cf@bot"
          git config --global user.name "CloudForge"
          git add ip.txt
          git commit -m "Tailscale IP: $tsIP"
          git push
        }
        
        Write-Host "RDP READY! User: RDP | Pass: CloudForge@RDP@2026!!"
        Start-Sleep -Seconds 43200
